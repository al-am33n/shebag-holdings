# ── Redirects for renamed pages ──
[[redirects]]
  from = "/ict"
  to = "/computing"
  status = 301
[[redirects]]
  from = "/ict.html"
  to = "/computing.html"
  status = 301

# ── Security headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
